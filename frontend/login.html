<!DOCTYPE html>
<html>
<head>
    <title>Aroma Cafe - Login</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #6f4e37; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 10px; text-align: center; width: 300px; box-shadow: 0px 4px 10px rgba(0,0,0,0.2); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #5d4037; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #4e342e; }
        a { text-decoration: none; color: #5d4037; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>☕ Aroma Login</h2>
        <input type="email" id="email" placeholder="Email (admin@cafe.com)">
        <input type="password" id="password" placeholder="Password (cafe123)">
        <button onclick="handleLogin()">Login</button>
        
        
    </div>

    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Please fill in all fields");
                return;
            }

            try {
                const response = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();
                
                // Backend result.success kudutha mattum thaan dashboard-ku pogum
                if (result.success || response.ok) {
                    alert(result.message || "Login Successful!");
                    window.location.href = 'dashboard.html';
                } else {
                    alert(result.message || "Invalid Username or Password!");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Backend server connection error! Make sure Docker is running.");
            }
        }
    </script>
</body>
</html>
