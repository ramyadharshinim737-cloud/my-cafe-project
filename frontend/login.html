<!DOCTYPE html>
<html>
<head>
    <title>Aroma Cafe - Login</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #6f4e37; }
        .login-box { background: white; padding: 30px; border-radius: 10px; text-align: center; width: 300px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #5d4037; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>☕ Aroma Login</h2>
        <input type="email" id="email" placeholder="Email (admin@cafe.com)">
        <input type="password" id="password" placeholder="Password (cafe123)">
        <button onclick="handleLogin()">Login</button>
    </div>

    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await fetch('http://localhost:5000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();
            if (result.success) {
                alert(result.message);
                window.location.href = 'dashboard.html'; // Login aanathum dashboard-ku pogum
            } else {
                alert(result.message);
            }
        }
    </script>
</body>
</html>
