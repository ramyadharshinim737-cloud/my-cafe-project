<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroma Cafe | Login</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <div class="login-container">
        <div class="logo-section">
            <img src="assets/logo.png" alt="Cafe Logo" class="logo">
        </div>

        <h2>Welcome to Aroma Cafe</h2>
        <p>Please login to order your favorite coffee</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>
        
        <p class="footer-text">New here? <a href="#">Create an account</a></p>
    </div>

    <script src="script.js"></script> </body>
</html>
